<body>
  <!-- Boot screen -->
  <div id="boot" class="boot" aria-hidden="false">
    <div class="boot-logo">
      <svg viewBox="0 0 64 64" width="96" height="96" aria-hidden="true">
        <circle cx="32" cy="32" r="28" fill="none" stroke="#E95420" stroke-width="2" />
        <circle cx="16" cy="32" r="4" fill="#E95420" />
        <circle cx="22" cy="22" r="4" fill="#E95420" />
        <circle cx="22" cy="42" r="4" fill="#E95420" />

        <circle cx="42" cy="22" r="4" fill="#E95420" />
        <circle cx="42" cy="42" r="4" fill="#E95420" />
        <circle cx="48" cy="32" r="4" fill="#E95420" />
        <circle cx="32" cy="32" r="6" fill="#FFFFFF" />
      </svg>
    </div>
    <div class="boot-brand">adamsims.dev</div>
    <div class="boot-progress"><div class="boot-progress-bar"></div></div>
    <div class="boot-log" id="bootLog"></div>
  </div>

  <!-- Lock/login (skipped, straight to desktop) -->

  <!-- Desktop -->
  <div id="desktop" class="desktop" hidden>
    <!-- Top bar -->
    <header class="topbar" role="banner">
      <div class="topbar-left">
        <button class="topbar-activities" id="activitiesBtn" aria-label="Activities">
          <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
            <circle cx="5" cy="5" r="1.5"/><circle cx="12" cy="5" r="1.5"/><circle cx="19" cy="5" r="1.5"/>
            <circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/>
            <circle cx="5" cy="19" r="1.5"/><circle cx="12" cy="19" r="1.5"/><circle cx="19" cy="19" r="1.5"/>
          </svg>
          Activities
        </button>
      </div>
      <div class="topbar-center" id="clock" aria-live="polite">--:--</div>
      <div class="topbar-right">
        <span class="topbar-pill" id="statusPill" title="Availability">● Available</span>
      </div>
    </header>

    <!-- Desktop icons -->
    <main class="desktop-icons" id="desktopIcons" aria-label="Desktop"></main>

    <!-- Window layer -->
    <div class="window-layer" id="windowLayer" aria-label="Windows"></div>

    <!-- Dock -->
    <nav class="dock" id="dock" aria-label="Dock"></nav>
  </div>

  <script defer src="js/bundle.js"></script>
